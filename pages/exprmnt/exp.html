<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MIDI Player</title>
</head>
<body>

<h2>MIDI Player</h2>

<input type="file" id="fileInput" accept=".mid,.midi" />
<br><br>

<button onclick="play()">Play</button>
<button onclick="pause()">Pause</button>
<button onclick="stop()">Stop</button>

<script type="module">
import * as Tone from "https://cdn.skypack.dev/tone";
import { Midi } from "https://cdn.skypack.dev/@tonejs/midi";

let midi;
let synth;

async function loadMidi(file) {
  const arrayBuffer = await file.arrayBuffer();
  midi = new Midi(arrayBuffer);

  // створюємо synth
  synth = new Tone.PolySynth(Tone.Synth).toDestination();

  // очищаємо попередній Transport
  Tone.Transport.cancel();

  // плануємо ноти
  midi.tracks.forEach(track => {
    track.notes.forEach(note => {
      Tone.Transport.schedule(time => {
        synth.triggerAttackRelease(
          note.name,
          note.duration,
          time,
          note.velocity
        );
      }, note.time);
    });
  });
}

document.getElementById("fileInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (file) {
    await loadMidi(file);
    console.log("MIDI loaded");
  }
});

window.play = async function() {
  if (!midi) return alert("Load MIDI first");

  await Tone.start(); // обов'язково після кліку
  Tone.Transport.start();
};

window.pause = function() {
  Tone.Transport.pause();
};

window.stop = function() {
  Tone.Transport.stop();
  Tone.Transport.position = 0;
};

</script>

</body>
</html>
